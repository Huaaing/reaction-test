<script>
const zone = document.getElementById('zone');
const zoneHint = document.createElement('div');
zoneHint.className = 'zone-hint';
zone.appendChild(zoneHint);

const totalRoundsEl = document.getElementById('totalRounds');
const bestEl = document.getElementById('best');
const avgEl = document.getElementById('avg');
const lastTimeEl = document.getElementById('lastTime');
const badgeEl = document.getElementById('badge');
const resultRow = document.getElementById('resultRow');
const roundProgress = document.getElementById('roundProgress');
const progressDots = document.getElementById('progressDots');
const currentRoundEl = document.getElementById('currentRound');
const roundSummary = document.getElementById('roundSummary');
const summaryScores = document.getElementById('summaryScores');
const roundAvgEl = document.getElementById('roundAvg');
const roundBadgeEl = document.getElementById('roundBadge');
const historyEl = document.getElementById('history');

const ROUND_SIZE = 5;

let state = 'idle';         // idle | waiting | ready | between | foul
let waitStart = 0;
let timeoutId = null;
let roundScores = [];       // current round's results (up to 5)
let allTimes = [];          // all individual times across all rounds
let roundAverages = [];     // average of each completed round
let totalRounds = 0;
let foulPenalty = false;    // if true, retry same test after cooldown

function setState(s) {
  state = s;
  zone.classList.remove('waiting', 'ready');
  if (s === 'idle') {
    zone.innerHTML = '点击开始新一轮';
    zone.appendChild(zoneHint);
    zoneHint.textContent = '每轮 5 次测试';
  } else if (s === 'waiting') {
    zone.classList.add('waiting');
    zone.innerHTML = '等待变绿...';
    zone.appendChild(zoneHint);
    zoneHint.textContent = `第 ${roundScores.length + 1} / 5 次`;
  } else if (s === 'ready') {
    zone.classList.add('ready');
    zone.innerHTML = '按下！';
    zone.appendChild(zoneHint);
    zoneHint.textContent = `第 ${roundScores.length + 1} / 5 次`;
  } else if (s === 'foul') {
    zone.innerHTML = '太早了！等变绿再点';
    zone.appendChild(zoneHint);
    zoneHint.textContent = '本次重来';
  }
}

function updateDots() {
  const dots = progressDots.querySelectorAll('.dot');
  dots.forEach((d, i) => {
    d.className = 'dot';
    if (i < roundScores.length) d.classList.add('done');
    if (i === roundScores.length) d.classList.add('active');
  });
  currentRoundEl.textContent = roundScores.length + 1;
}

function updateGlobalStats() {
  totalRoundsEl.textContent = totalRounds;
  if (allTimes.length > 0) {
    bestEl.textContent = Math.min(...allTimes);
    avgEl.textContent = Math.round(allTimes.reduce((a,b) => a+b, 0) / allTimes.length);
  }
}

function renderHistory() {
  historyEl.innerHTML = roundAverages.slice().reverse().slice(0, 12).map((avg, i) => {
    let cls = '';
    if      (avg < 200) cls = 'badge-fast';
    else if (avg < 350) cls = 'badge-normal';
    else                cls = 'badge-slow';
    return `<span class="history-item ${cls}">R${roundAverages.length - i}: ${avg}ms</span>`;
  }).join('');
}

function startTest() {
  if (foulPenalty) {
    // after foul, wait a bit then restart
    setTimeout(() => {
      zone.style.background = '';
      zone.style.borderColor = '';
      foulPenalty = false;
      startTest();
    }, 1200);
    return;
  }
  setState('waiting');
  updateDots();
  const delay = 1500 + Math.random() * 2500;
  timeoutId = setTimeout(() => {
    setState('ready');
    waitStart = performance.now();
  }, delay);
}

function finishRound() {
  const roundAvg = Math.round(roundScores.reduce((a,b) => a+b, 0) / ROUND_SIZE);
  roundAverages.push(roundAvg);
  allTimes.push(...roundScores);
  totalRounds++;

  // show round summary
  summaryScores.innerHTML = roundScores.map((t, i) => {
    let cls = '';
    if (t < 200) cls = 'badge-fast';
    else if (t < 350) cls = 'badge-normal';
    else cls = 'badge-slow';
    return `<span class="${cls}">${i+1}: ${t}ms</span>`;
  }).join('');
  roundAvgEl.textContent = roundAvg;

  let label = '', badgeClass = '';
  if (roundAvg < 200)       { label = '快如闪电'; badgeClass = 'badge-fast'; }
  else if (roundAvg < 280)  { label = '不错';     badgeClass = 'badge-normal'; }
  else if (roundAvg < 400)  { label = '一般';     badgeClass = 'badge-normal'; }
  else                      { label = '偏慢';     badgeClass = 'badge-slow'; }
  roundBadgeEl.textContent = label;
  roundBadgeEl.className = 'result-badge ' + badgeClass;

  roundSummary.style.display = '';
  roundProgress.style.display = 'none';
  resultRow.style.display = 'none';

  updateGlobalStats();
  renderHistory();
  setState('idle');
  zoneHint.textContent = '每轮 5 次测试';
}

zone.addEventListener('mousedown', (e) => {
  e.preventDefault();
  if (state === 'idle') {
    // start new round
    roundScores = [];
    roundSummary.style.display = 'none';
    resultRow.style.display = 'none';
    roundProgress.style.display = '';
    updateDots();
    startTest();

  } else if (state === 'waiting') {
    // foul — clicked before green
    clearTimeout(timeoutId);
    setState('foul');
    zone.style.background = '#b91c1c';
    zone.style.borderColor = '#ef4444';
    foulPenalty = true;
    setTimeout(() => {
      zone.style.background = '';
      zone.style.borderColor = '';
      foulPenalty = false;
      startTest();
    }, 1200);

  } else if (state === 'ready') {
    // valid reaction
    const reaction = Math.round(performance.now() - waitStart);
    roundScores.push(reaction);

    let label = '', badgeClass = '';
    if (reaction < 200)       { label = '快如闪电'; badgeClass = 'badge-fast'; }
    else if (reaction < 280)  { label = '不错';     badgeClass = 'badge-normal'; }
    else if (reaction < 400)  { label = '一般';     badgeClass = 'badge-normal'; }
    else                      { label = '偏慢';     badgeClass = 'badge-slow'; }

    lastTimeEl.textContent = reaction;
    badgeEl.textContent = label;
    badgeEl.className = 'result-badge ' + badgeClass;
    resultRow.style.display = 'flex';

    updateDots();

    if (roundScores.length >= ROUND_SIZE) {
      finishRound();
    } else {
      // brief pause between tests, then start next
      setState('idle');
      zoneHint.textContent = `第 ${roundScores.length + 1} / 5 次`;
      setTimeout(() => startTest(), 800);
    }
  }
});
</script>
